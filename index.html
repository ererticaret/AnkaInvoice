<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AnkaInvoice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <h1>AnkaInvoice</h1>
    <button onclick="startApp()">Get Started</button>
  </header>

  <section class="hero">
    <h2>Create invoices in seconds</h2>
    <p>No complexity. No accounting skills needed. Just get paid.</p>
    <button onclick="startApp()">Start Now</button>
  </section>

  <section id="app" style="display:none;">
    <div class="container">
      <h2>Invoice Generator</h2>

      <input type="text" id="clientName" placeholder="Client Name">
      <input type="text" id="service" placeholder="Service">
      <input type="number" id="amount" placeholder="Amount (€)">

      <button onclick="generateInvoice()">Create Invoice</button>

      <div id="invoiceOutput"></div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
